[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chipcompiler"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "numpy>=1.21.0",
    "pandas>=1.3.0",
    "matplotlib>=3.4.0",
    "scipy>=1.7.0",
    "pyjson5>=1.6.0",
    "pyyaml>=6.0",
    "klayout==0.30.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
]
